<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="description" content="Votre panier sur Orakel. Commandez et faites-vous livrer partout en Côte d'Ivoire.">
<meta name="keywords" content="marketplace Côte d'Ivoire, acheter en ligne Abidjan, téléphone CI, livraison Abidjan, Wave paiement, Orange Money">
<meta name="author" content="Orakel">
<meta property="og:title" content="Mon Panier - Orakel">
<meta property="og:description" content="Votre panier sur Orakel. Commandez et faites-vous livrer partout en Côte d'Ivoire.">
<meta property="og:type" content="website">
<meta property="og:url" content="https://orakelshop.netlify.app">
<meta property="og:site_name" content="Orakel">
<meta name="twitter:card" content="summary_large_image">
<meta name="twitter:title" content="Mon Panier - Orakel">
<meta name="twitter:description" content="Votre panier sur Orakel. Commandez et faites-vous livrer partout en Côte d'Ivoire.">
<link rel="canonical" href="https://orakelshop.netlify.app/panier.html">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mon Panier - Orakel</title>
<link href="https://fonts.googleapis.com/css2?family=Nunito:ital,wght@1,400;1,600;1,700;1,800;1,900&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box;}
body{font-family:'Nunito',sans-serif;font-style:italic;background:#f5f5f5;color:#222;}

.header{position:sticky;top:0;z-index:100;background:#1B3A8C;box-shadow:0 2px 12px rgba(0,0,0,.2);}
.header-main{display:flex;align-items:center;gap:12px;padding:10px 16px;}
.back-btn{background:rgba(255,255,255,.15);border:none;border-radius:10px;width:38px;height:38px;display:flex;align-items:center;justify-content:center;cursor:pointer;flex-shrink:0;}
.header-title{color:#fff;font-size:16px;font-weight:900;flex:1;}
.clear-btn{background:rgba(255,255,255,.15);border:none;border-radius:10px;padding:8px 12px;color:#fff;font-family:'Nunito',sans-serif;font-style:italic;font-size:12px;font-weight:700;cursor:pointer;}

/* EMPTY */
.empty-cart{display:flex;flex-direction:column;align-items:center;justify-content:center;padding:80px 24px;text-align:center;}
.empty-cart svg{opacity:.15;margin-bottom:20px;}
.empty-cart h2{font-size:20px;font-weight:900;color:#333;margin-bottom:8px;}
.empty-cart p{font-size:14px;color:#888;margin-bottom:24px;}
.btn-shop{display:inline-block;padding:14px 32px;background:#1B3A8C;color:#fff;border-radius:14px;text-decoration:none;font-size:14px;font-weight:900;}

/* CART ITEMS */
.cart-items{padding:8px;}
.cart-item{background:#fff;border-radius:14px;padding:12px;display:flex;gap:12px;align-items:flex-start;margin-bottom:8px;position:relative;}
.cart-item-img{width:80px;height:80px;border-radius:10px;object-fit:cover;background:#f0f0f0;flex-shrink:0;}
.cart-item-img-placeholder{width:80px;height:80px;border-radius:10px;background:linear-gradient(135deg,#f0f0ff,#e0e0ff);display:flex;align-items:center;justify-content:center;font-size:30px;flex-shrink:0;}
.cart-item-info{flex:1;}
.cart-item-name{font-size:13px;font-weight:800;color:#222;margin-bottom:4px;line-height:1.3;}
.cart-item-price{font-size:16px;font-weight:900;color:#1B3A8C;margin-bottom:8px;}
.qty-ctrl{display:flex;align-items:center;gap:0;border:1.5px solid #ddd;border-radius:8px;overflow:hidden;width:fit-content;}
.qty-btn{width:32px;height:32px;border:none;background:#f5f5f5;font-size:18px;cursor:pointer;display:flex;align-items:center;justify-content:center;font-weight:900;font-family:'Nunito',sans-serif;}
.qty-btn:hover{background:#e0e0ff;}
.qty-val{width:40px;text-align:center;font-size:14px;font-weight:900;border:none;background:#fff;font-family:'Nunito',sans-serif;font-style:italic;}
.delete-btn{position:absolute;top:10px;right:10px;background:none;border:none;cursor:pointer;padding:4px;color:#ccc;transition:color .2s;}
.delete-btn:hover{color:#e8002d;}

/* SUMMARY */
.cart-summary{background:#fff;margin:8px;border-radius:14px;padding:16px;}
.summary-title{font-size:15px;font-weight:900;margin-bottom:14px;padding-bottom:10px;border-bottom:1px solid #f0f0f0;}
.summary-row{display:flex;justify-content:space-between;align-items:center;margin-bottom:10px;font-size:13px;}
.summary-row.total{font-size:16px;font-weight:900;color:#1B3A8C;padding-top:10px;border-top:2px solid #e8f0ff;margin-top:4px;}
.summary-row span:first-child{color:#666;}
.promo-row{display:flex;gap:8px;margin-bottom:14px;}
.promo-input{flex:1;padding:10px 12px;border:1.5px solid #ddd;border-radius:10px;font-family:'Nunito',sans-serif;font-style:italic;font-size:13px;outline:none;}
.promo-input:focus{border-color:#1B3A8C;}
.promo-btn{padding:10px 16px;background:#1B3A8C;color:#fff;border:none;border-radius:10px;font-family:'Nunito',sans-serif;font-style:italic;font-size:13px;font-weight:800;cursor:pointer;}

/* CHECKOUT BTN */
.checkout-fixed{position:fixed;bottom:0;left:0;right:0;background:#fff;padding:16px;border-top:1px solid #eee;z-index:100;}
.checkout-btn{width:100%;padding:16px;background:#1B3A8C;color:#fff;border:none;border-radius:14px;font-family:'Nunito',sans-serif;font-style:italic;font-size:16px;font-weight:900;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:10px;transition:background .2s;}
.checkout-btn:hover{background:#2650c8;}

/* TRUST BADGES */
.trust-strip{display:flex;gap:10px;padding:8px 8px 4px;overflow-x:auto;}
.trust-strip::-webkit-scrollbar{display:none;}
.trust-item{display:flex;align-items:center;gap:6px;background:#fff;border-radius:10px;padding:8px 12px;white-space:nowrap;flex-shrink:0;}
.trust-item svg{color:#1B3A8C;}
.trust-item span{font-size:11px;font-weight:700;color:#444;}

.bottom-spacer{height:80px;}
.toast{position:fixed;bottom:90px;left:50%;transform:translateX(-50%) translateY(20px);background:#111;color:#fff;padding:10px 20px;border-radius:20px;font-size:13px;font-weight:700;opacity:0;transition:all .3s;z-index:9999;white-space:nowrap;}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0);}

@media(min-width:768px){
  .header-main,.cart-items,.cart-summary,.trust-strip,.checkout-fixed>*{max-width:600px;margin-left:auto;margin-right:auto;}
}
</style>
</head>
<body>

<div class="header">
  <div class="header-main">
    <button class="back-btn" onclick="history.back()">
      <svg viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="2.5" width="20" height="20"><path d="M19 12H5M12 5l-7 7 7 7"/></svg>
    </button>
    <span class="header-title">Mon Panier <span id="itemCount" style="font-size:13px;opacity:.8;"></span></span>
    <button class="clear-btn" onclick="clearCart()">Vider</button>
  </div>
</div>

<div id="cartContent">
  <!-- Rendered dynamically -->
</div>

<div class="bottom-spacer"></div>
<div class="toast" id="toast"></div>

<script>
const CART_KEY = 'orakel_cart';

function getCart() { return JSON.parse(localStorage.getItem(CART_KEY) || '[]'); }
function saveCart(cart) { localStorage.setItem(CART_KEY, JSON.stringify(cart)); }
function fmt(n) { return new Intl.NumberFormat('fr-FR').format(n) + ' F'; }

function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2000);
}

function changeQty(id, delta) {
  const cart = getCart();
  const idx = cart.findIndex(i => i.id === id);
  if (idx < 0) return;
  cart[idx].qty = Math.max(1, (cart[idx].qty || 1) + delta);
  saveCart(cart);
  render();
}

function removeItem(id) {
  const cart = getCart().filter(i => i.id !== id);
  saveCart(cart);
  showToast('Article retiré');
  render();
}

function clearCart() {
  if (!confirm('Vider le panier ?')) return;
  saveCart([]);
  render();
}

function applyPromo() {
  const code = document.getElementById('promoInput')?.value?.trim().toUpperCase();
  if (code === 'ORAKEL10') {
    showToast('✅ Code -10% appliqué !');
  } else {
    showToast('❌ Code invalide');
  }
}

function render() {
  const cart = getCart();
  const container = document.getElementById('cartContent');
  document.getElementById('itemCount').textContent = cart.length > 0 ? `(${cart.length})` : '';

  if (cart.length === 0) {
    container.innerHTML = `
      <div class="empty-cart">
        <svg viewBox="0 0 24 24" fill="none" stroke="#1B3A8C" stroke-width="1.5" width="80" height="80">
          <path d="M6 2L3 6v14a2 2 0 002 2h14a2 2 0 002-2V6l-3-4z"/>
          <line x1="3" y1="6" x2="21" y2="6"/>
          <path d="M16 10a4 4 0 01-8 0"/>
        </svg>
        <h2>Votre panier est vide</h2>
        <p>Découvrez nos produits et ajoutez vos coups de cœur !</p>
        <a class="btn-shop" href="index.html">Découvrir les produits</a>
      </div>`;
    return;
  }

  const subtotal = cart.reduce((s, i) => s + (i.price * (i.qty || 1)), 0);
  const delivery = subtotal >= 50000 ? 0 : 2000;
  const total = subtotal + delivery;

  let itemsHTML = cart.map(item => {
    const img = item.image
      ? `<img class="cart-item-img" src="${item.image}" alt="${item.name}" onerror="this.outerHTML='<div class=cart-item-img-placeholder>🛍️</div>'">`
      : `<div class="cart-item-img-placeholder">🛍️</div>`;
    return `
      <div class="cart-item">
        <a href="produit.html?id=${item.id}">${img}</a>
        <div class="cart-item-info">
          <p class="cart-item-name">${item.name}</p>
          <p class="cart-item-price">${fmt(item.price * (item.qty || 1))}</p>
          <div class="qty-ctrl">
            <button class="qty-btn" onclick="changeQty('${item.id}', -1)">−</button>
            <span class="qty-val">${item.qty || 1}</span>
            <button class="qty-btn" onclick="changeQty('${item.id}', 1)">+</button>
          </div>
        </div>
        <button class="delete-btn" onclick="removeItem('${item.id}')" title="Supprimer">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="20" height="20"><polyline points="3 6 5 6 21 6"/><path d="M19 6v14a2 2 0 01-2 2H7a2 2 0 01-2-2V6m3 0V4a1 1 0 011-1h4a1 1 0 011 1v2"/></svg>
        </button>
      </div>`;
  }).join('');

  container.innerHTML = `
    <div class="cart-items">${itemsHTML}</div>

    <div class="trust-strip">
      <div class="trust-item"><svg viewBox="0 0 24 24" fill="none" stroke="#1B3A8C" stroke-width="2" width="16" height="16"><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/></svg><span>Paiement sécurisé</span></div>
      <div class="trust-item"><svg viewBox="0 0 24 24" fill="none" stroke="#1B3A8C" stroke-width="2" width="16" height="16"><path d="M5 17H3a2 2 0 01-2-2V5a2 2 0 012-2h11l5 5v9a2 2 0 01-2 2h-2"/><circle cx="7.5" cy="17.5" r="2.5"/><circle cx="17.5" cy="17.5" r="2.5"/></svg><span>Livraison rapide</span></div>
      <div class="trust-item"><svg viewBox="0 0 24 24" fill="none" stroke="#1B3A8C" stroke-width="2" width="16" height="16"><path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0118 0z"/><circle cx="12" cy="10" r="3"/></svg><span>Partout en CI</span></div>
    </div>

    <div class="cart-summary">
      <div class="summary-title">Récapitulatif</div>
      <div class="summary-row"><span>Sous-total (${cart.reduce((s,i)=>s+(i.qty||1),0)} article${cart.length>1?'s':''})</span><span>${fmt(subtotal)}</span></div>
      <div class="summary-row"><span>Livraison</span><span style="color:${delivery===0?'#16a34a':'#222'}">${delivery === 0 ? '🎉 Gratuite' : fmt(delivery)}</span></div>
      ${delivery > 0 ? `<div style="font-size:11px;color:#666;margin-bottom:10px;">Livraison gratuite dès ${fmt(50000)} d'achat</div>` : ''}
      <div class="promo-row">
        <input type="text" id="promoInput" class="promo-input" placeholder="Code promo (ex: ORAKEL10)">
        <button class="promo-btn" onclick="applyPromo()">OK</button>
      </div>
      <div class="summary-row total"><span>Total</span><span>${fmt(total)}</span></div>
    </div>

    <div class="checkout-fixed">
      <button class="checkout-btn" onclick="location.href='commande.html'">
        <svg viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="2.5" width="20" height="20"><path d="M5 12h14M12 5l7 7-7 7"/></svg>
        Commander — ${fmt(total)}
      </button>
    </div>`;
}

window.changeQty = changeQty;
window.removeItem = removeItem;
window.clearCart = clearCart;
window.applyPromo = applyPromo;

render();
</script>

</body>
</html>

<style>
*{margin:0;padding:0;box-sizing:border-box;}
body{font-family:'Nunito',sans-serif;font-style:italic;background:#f5f5f5;color:#222;}

/* HEADER */
.header{position:sticky;top:0;z-index:100;background:#1B3A8C;box-shadow:0 2px 12px rgba(0,0,0,.2);}
.header-main{display:flex;align-items:center;gap:12px;padding:10px 16px;}
.back-btn{background:rgba(255,255,255,.15);border:none;border-radius:10px;width:38px;height:38px;display:flex;align-items:center;justify-content:center;cursor:pointer;flex-shrink:0;}
.header-title{color:#fff;font-size:16px;font-weight:900;flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
.cart-btn{background:rgba(255,255,255,.15);border:none;border-radius:10px;width:38px;height:38px;display:flex;align-items:center;justify-content:center;cursor:pointer;position:relative;text-decoration:none;}
.cart-badge{position:absolute;top:-4px;right:-4px;background:#ff3333;color:#fff;font-size:9px;font-weight:900;width:16px;height:16px;border-radius:50%;display:none;align-items:center;justify-content:center;}

/* PRODUCT MAIN */
.product-gallery{background:#fff;position:relative;}
.main-img-wrap{width:100%;aspect-ratio:1;background:#f0f0f0;display:flex;align-items:center;justify-content:center;overflow:hidden;}
.main-img-wrap img{width:100%;height:100%;object-fit:contain;}
.badges{position:absolute;top:12px;left:12px;display:flex;flex-direction:column;gap:6px;}
.badge-flash{background:linear-gradient(135deg,#ff3333,#cc0000);color:#fff;padding:4px 10px;border-radius:12px;font-size:11px;font-weight:900;display:flex;align-items:center;gap:4px;}
.badge-promo{background:#1B3A8C;color:#fff;padding:4px 10px;border-radius:12px;font-size:11px;font-weight:900;}
.thumbs{display:flex;gap:8px;padding:10px 16px;overflow-x:auto;background:#fff;border-top:1px solid #eee;}
.thumb{width:60px;height:60px;border-radius:8px;object-fit:cover;border:2px solid transparent;cursor:pointer;flex-shrink:0;}
.thumb.active{border-color:#1B3A8C;}

/* INFO */
.product-info-section{background:#fff;padding:16px;margin-top:8px;}
.product-name-big{font-size:17px;font-weight:900;color:#111;line-height:1.3;margin-bottom:10px;}
.price-row{display:flex;align-items:center;gap:10px;flex-wrap:wrap;margin-bottom:6px;}
.price-main{font-size:26px;font-weight:900;color:#1B3A8C;}
.price-old{font-size:15px;color:#999;text-decoration:line-through;}
.price-disc{background:#ff3333;color:#fff;padding:3px 10px;border-radius:10px;font-size:12px;font-weight:900;}
.stock-row{font-size:12px;color:#16a34a;font-weight:700;margin-bottom:12px;}
.stock-out{color:#e8002d;}

.rating-row{display:flex;align-items:center;gap:8px;margin-bottom:14px;}
.stars{color:#f5a623;font-size:14px;}
.rating-count{font-size:12px;color:#666;}

/* QTY */
.qty-row{display:flex;align-items:center;gap:16px;margin-bottom:16px;}
.qty-label{font-size:13px;font-weight:700;color:#444;}
.qty-ctrl{display:flex;align-items:center;gap:0;border:1.5px solid #ddd;border-radius:10px;overflow:hidden;}
.qty-btn{width:38px;height:38px;border:none;background:#f5f5f5;font-size:20px;cursor:pointer;display:flex;align-items:center;justify-content:center;font-weight:900;font-family:'Nunito',sans-serif;}
.qty-btn:hover{background:#e0e0ff;}
.qty-val{width:44px;text-align:center;font-size:15px;font-weight:900;background:#fff;border:none;font-family:'Nunito',sans-serif;font-style:italic;}

/* ACTIONS */
.action-row{display:flex;gap:10px;margin-bottom:8px;}
.btn-cart{flex:1;padding:14px;background:#1B3A8C;color:#fff;border:none;border-radius:14px;font-size:15px;font-weight:900;font-family:'Nunito',sans-serif;font-style:italic;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:8px;transition:background .2s;}
.btn-cart:hover{background:#2650c8;}
.btn-buy{flex:1;padding:14px;background:linear-gradient(135deg,#ff3333,#cc0000);color:#fff;border:none;border-radius:14px;font-size:15px;font-weight:900;font-family:'Nunito',sans-serif;font-style:italic;cursor:pointer;transition:opacity .2s;}
.btn-buy:hover{opacity:.9;}
.btn-wa{width:100%;padding:13px;background:#25D366;color:#fff;border:none;border-radius:14px;font-size:14px;font-weight:900;font-family:'Nunito',sans-serif;font-style:italic;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:8px;}

/* DESCRIPTION */
.desc-section{background:#fff;padding:16px;margin-top:8px;}
.section-title-sm{font-size:14px;font-weight:900;color:#222;margin-bottom:10px;border-bottom:2px solid #e8f0ff;padding-bottom:8px;}
.desc-text{font-size:13px;color:#444;line-height:1.7;}

/* DELIVERY INFO */
.delivery-section{background:#fff;padding:16px;margin-top:8px;}
.delivery-item{display:flex;align-items:flex-start;gap:12px;padding:10px 0;border-bottom:1px solid #f0f0f0;}
.delivery-item:last-child{border-bottom:none;}
.delivery-icon{width:36px;height:36px;background:#e8f0ff;border-radius:10px;display:flex;align-items:center;justify-content:center;flex-shrink:0;}
.delivery-text p{font-size:13px;font-weight:800;color:#222;}
.delivery-text span{font-size:11px;color:#666;}

/* SKELETON */
.skeleton{background:linear-gradient(90deg,#f0f0f0 25%,#e0e0e0 50%,#f0f0f0 75%);background-size:200% 100%;animation:shimmer 1.5s infinite;border-radius:8px;}
@keyframes shimmer{0%{background-position:200% 0}100%{background-position:-200% 0}}

/* TOAST */
.toast{position:fixed;bottom:90px;left:50%;transform:translateX(-50%) translateY(20px);background:#111;color:#fff;padding:10px 20px;border-radius:20px;font-size:13px;font-weight:700;opacity:0;transition:all .3s;z-index:9999;white-space:nowrap;}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0);}

/* BOTTOM NAV */
.bottom-spacer{height:70px;}
.bottom-nav{position:fixed;bottom:0;left:0;right:0;background:#fff;border-top:1px solid #eee;display:flex;z-index:1000;}
.nav-item{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:8px 4px;color:#999;font-size:10px;font-weight:700;text-decoration:none;gap:3px;}
.nav-item.active,.nav-item:hover{color:#1B3A8C;}
.nav-item svg{width:22px;height:22px;stroke:currentColor;}

@media(min-width:768px){
  .header-main{max-width:900px;margin:0 auto;padding:12px 40px;}
  .main-content{max-width:900px;margin:0 auto;}
}
</style>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getFirestore, doc, getDoc } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyA-nTe9-e0YRHNiYecTqunP2yf_g_p9GBU",
  authDomain: "orakelci.firebaseapp.com",
  projectId: "orakelci",
  storageBucket: "orakelci.firebasestorage.app",
  messagingSenderId: "112433791052",
  appId: "1:112433791052:web:cdb466e52548d4c7b374e9"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

const params = new URLSearchParams(location.search);
const productId = params.get('id');

let product = null;
let qty = 1;

function fmt(n) { return new Intl.NumberFormat('fr-FR').format(n) + ' F'; }

function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2500);
}

function updateCartBadge() {
  const cart = JSON.parse(localStorage.getItem('orakel_cart') || '[]');
  const total = cart.reduce((s, i) => s + (i.qty || 1), 0);
  const badge = document.getElementById('cartBadge');
  badge.textContent = total;
  badge.style.display = total > 0 ? 'flex' : 'none';
}

function addToCart() {
  if (!product) return;
  const cart = JSON.parse(localStorage.getItem('orakel_cart') || '[]');
  const idx = cart.findIndex(i => i.id === productId);
  if (idx > -1) {
    cart[idx].qty = (cart[idx].qty || 1) + qty;
  } else {
    cart.push({ id: productId, name: product.name, price: product.price, image: product.image || '', qty });
  }
  localStorage.setItem('orakel_cart', JSON.stringify(cart));
  updateCartBadge();
  showToast('✅ Ajouté au panier !');
}

function buyNow() {
  addToCart();
  setTimeout(() => { location.href = 'commande.html'; }, 500);
}

function changeQty(delta) {
  qty = Math.max(1, qty + delta);
  document.getElementById('qtyVal').value = qty;
}

async function loadProduct() {
  if (!productId) {
    document.getElementById('infoSection').innerHTML = '<p style="color:#e8002d;padding:20px;font-size:14px;">Produit introuvable.</p>';
    return;
  }
  try {
    const docSnap = await getDoc(doc(db, 'products', productId));
    if (!docSnap.exists()) {
      document.getElementById('infoSection').innerHTML = '<p style="color:#e8002d;padding:20px;font-size:14px;">Ce produit n\'existe plus.</p>';
      return;
    }
    product = { id: docSnap.id, ...docSnap.data() };
    render(product);
  } catch(e) {
    console.error(e);
    document.getElementById('infoSection').innerHTML = '<p style="color:#e8002d;padding:20px;font-size:14px;">Erreur de chargement.</p>';
  }
}

function render(p) {
  document.title = p.name + ' - Orakel';
  document.getElementById('headerTitle').textContent = p.name;

  // Gallery - multi images
  const imgWrap = document.getElementById('mainImgWrap');
  const thumbsRow = document.getElementById('thumbsRow');
  const images = [p.image, p.image2, p.image3, p.image4].filter(Boolean);
  
  if (images.length > 0) {
    imgWrap.innerHTML = `<img id="mainProductImg" src="${images[0]}" alt="${p.name}" style="width:100%;height:100%;object-fit:contain;" onerror="this.style.display='none'">`;
    
    if (images.length > 1) {
      thumbsRow.style.display = 'flex';
      thumbsRow.innerHTML = images.map((img, i) => `
        <img src="${img}" 
          onclick="document.getElementById('mainProductImg').src='${img}';document.querySelectorAll('.thumb-mini').forEach(t=>t.style.border='2px solid transparent');this.style.border='2px solid #1B3A8C';"
          class="thumb-mini"
          style="width:60px;height:60px;border-radius:8px;object-fit:cover;cursor:pointer;flex-shrink:0;border:${i===0?'2px solid #1B3A8C':'2px solid transparent'};"
          loading="lazy">
      `).join('');
    }
  } else {
    imgWrap.innerHTML = `<div style="font-size:60px;padding:40px;">🛍️</div>`;
  }

  // Badges
  const badgesEl = document.getElementById('badges');
  let bHTML = '';
  if (p.isFlash) bHTML += `<div class="badge-flash"><svg viewBox="0 0 24 24" fill="#fff" width="10" height="10"><path d="M13 2L3 14h9l-1 8 10-12h-9l1-8z"/></svg>Flash</div>`;
  if (p.badge) bHTML += `<div class="badge-promo">${p.badge}</div>`;
  badgesEl.innerHTML = bHTML;

  // Discount calc
  const disc = p.oldPrice && p.price ? Math.round((1 - p.price/p.oldPrice)*100) : null;

  // Info section
  const stockHTML = p.stock > 0
    ? `<div class="stock-row">✅ En stock (${p.stock} disponibles)</div>`
    : `<div class="stock-row stock-out">❌ Rupture de stock</div>`;

  document.getElementById('infoSection').innerHTML = `
    <h1 class="product-name-big">${p.name}</h1>
    <div class="price-row">
      <span class="price-main">${fmt(p.price)}</span>
      ${p.oldPrice ? `<span class="price-old">${fmt(p.oldPrice)}</span>` : ''}
      ${disc ? `<span class="price-disc">-${disc}%</span>` : ''}
    </div>
    ${stockHTML}
    <div class="rating-row">
      <span class="stars">★★★★☆</span>
      <span class="rating-count">(4.2 / 5 • 28 avis)</span>
    </div>
    <div class="qty-row">
      <span class="qty-label">Quantité :</span>
      <div class="qty-ctrl">
        <button class="qty-btn" onclick="changeQty(-1)">−</button>
        <input class="qty-val" id="qtyVal" type="number" value="1" min="1" readonly>
        <button class="qty-btn" onclick="changeQty(1)">+</button>
      </div>
    </div>
    <div class="action-row">
      <button class="btn-cart" onclick="addToCart()">
        <svg viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="2.5" width="18" height="18"><path d="M6 2L3 6v14a2 2 0 002 2h14a2 2 0 002-2V6l-3-4z"/><line x1="3" y1="6" x2="21" y2="6"/></svg>
        Ajouter au panier
      </button>
      <button class="btn-buy" onclick="buyNow()">Acheter</button>
    </div>
    <button class="btn-wa" onclick="window.open('https://wa.me/2250788256952?text=Bonjour+Orakel+%F0%9F%91%8B+Je+suis+intéressé+par+:+${encodeURIComponent(p.name)}+(%id=${productId})', '_blank')">
      <svg viewBox="0 0 24 24" fill="#fff" width="18" height="18"><path d="M17.472 14.382c-.297-.149-1.758-.867-2.03-.967-.273-.099-.471-.148-.67.15-.197.297-.767.966-.94 1.164-.173.199-.347.223-.644.075-.297-.15-1.255-.463-2.39-1.475-.883-.788-1.48-1.761-1.653-2.059-.173-.297-.018-.458.13-.606.134-.133.298-.347.446-.52.149-.174.198-.298.298-.497.099-.198.05-.371-.025-.52-.075-.149-.669-1.612-.916-2.207-.242-.579-.487-.5-.669-.51-.173-.008-.371-.01-.57-.01-.198 0-.52.074-.792.372-.272.297-1.04 1.016-1.04 2.479 0 1.462 1.065 2.875 1.213 3.074.149.198 2.096 3.2 5.077 4.487.709.306 1.262.489 1.694.625.712.227 1.36.195 1.871.118.571-.085 1.758-.719 2.006-1.413.248-.694.248-1.289.173-1.413-.074-.124-.272-.198-.57-.347m-5.421 7.403h-.004a9.87 9.87 0 01-5.031-1.378l-.361-.214-3.741.982.998-3.648-.235-.374a9.86 9.86 0 01-1.51-5.26c.001-5.45 4.436-9.884 9.888-9.884 2.64 0 5.122 1.03 6.988 2.898a9.825 9.825 0 012.893 6.994c-.003 5.45-4.437 9.884-9.885 9.884m8.413-18.297A11.815 11.815 0 0012.05 0C5.495 0 .16 5.335.157 11.892c0 2.096.547 4.142 1.588 5.945L.057 24l6.305-1.654a11.882 11.882 0 005.683 1.448h.005c6.554 0 11.89-5.335 11.893-11.893a11.821 11.821 0 00-3.48-8.413z"/></svg>
      Commander via WhatsApp
    </button>
  `;

  // Description
  if (p.description) {
    document.getElementById('descText').textContent = p.description;
    document.getElementById('descSection').style.display = 'block';
  }

  updateCartBadge();
}

// Expose functions
window.addToCart = addToCart;
window.buyNow = buyNow;
window.changeQty = changeQty;


// ── FAVORIS ──
function checkFav() {
  const favs = JSON.parse(localStorage.getItem('orakel_favoris') || '[]');
  const isFav = favs.some(f => f.id === productId);
  const icon = document.getElementById('favIcon');
  if (icon) {
    icon.setAttribute('fill', isFav ? '#ff3333' : 'none');
    icon.setAttribute('stroke', isFav ? '#ff3333' : '#fff');
  }
}

window.toggleFav = function() {
  if (!product) return;
  const favs = JSON.parse(localStorage.getItem('orakel_favoris') || '[]');
  const idx = favs.findIndex(f => f.id === productId);
  if (idx > -1) {
    favs.splice(idx, 1);
    showToast('Retiré des favoris');
  } else {
    favs.push({ id: productId, name: product.name, price: product.price, image: product.image || '' });
    showToast('Ajouté aux favoris !');
  }
  localStorage.setItem('orakel_favoris', JSON.stringify(favs));
  checkFav();
};

loadProduct();
checkFav();
updateCartBadge();
</script>

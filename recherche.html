<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Recherche - Orakel</title>
<meta name="description" content="Recherchez parmi des milliers de produits sur Orakel, la marketplace N°1 en Côte d'Ivoire.">
<link href="https://fonts.googleapis.com/css2?family=Nunito:ital,wght@1,400;1,600;1,700;1,800;1,900&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box;}
body{font-family:'Nunito',sans-serif;font-style:italic;background:#f5f5f5;color:#222;}

.header{position:sticky;top:0;z-index:100;background:#1B3A8C;box-shadow:0 2px 12px rgba(0,0,0,.2);}
.header-main{display:flex;align-items:center;gap:10px;padding:10px 16px;}
.back-btn{background:rgba(255,255,255,.15);border:none;border-radius:10px;width:38px;height:38px;display:flex;align-items:center;justify-content:center;cursor:pointer;flex-shrink:0;}
.search-wrap{flex:1;display:flex;background:rgba(255,255,255,.15);border-radius:20px;overflow:hidden;border:1.5px solid rgba(255,255,255,.4);}
.search-wrap input{flex:1;padding:8px 14px;border:none;outline:none;background:transparent;color:#fff;font-family:'Nunito',sans-serif;font-style:italic;font-size:14px;}
.search-wrap input::placeholder{color:rgba(255,255,255,.7);}
.search-wrap button{background:rgba(255,255,255,.2);border:none;padding:8px 14px;cursor:pointer;}
.cart-btn{background:rgba(255,255,255,.15);border:none;border-radius:10px;width:38px;height:38px;display:flex;align-items:center;justify-content:center;cursor:pointer;position:relative;text-decoration:none;flex-shrink:0;}
.cart-badge{position:absolute;top:-4px;right:-4px;background:#ff3333;color:#fff;font-size:9px;font-weight:900;width:16px;height:16px;border-radius:50%;display:none;align-items:center;justify-content:center;}

.result-info{padding:10px 16px;font-size:13px;color:#666;background:#fff;border-bottom:1px solid #eee;}
.result-info strong{color:#1B3A8C;}

.products-section{padding:10px;}
.products-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;}
@media(min-width:600px){.products-grid{grid-template-columns:repeat(3,1fr);}}
@media(min-width:900px){.products-grid{grid-template-columns:repeat(4,1fr);max-width:1200px;margin:0 auto;}}

.product-card{border:1px solid #eee;border-radius:12px;overflow:hidden;cursor:pointer;background:#fff;display:block;text-decoration:none;color:inherit;transition:transform .2s;}
.product-card:hover{transform:translateY(-2px);}
.product-img{width:100%;aspect-ratio:1;object-fit:cover;background:#f5f5f5;display:block;}
.product-img-placeholder{width:100%;aspect-ratio:1;background:#f0f0ff;display:flex;align-items:center;justify-content:center;}
.product-info{padding:10px;}
.product-name{font-size:12px;font-weight:700;color:#222;margin-bottom:4px;line-height:1.3;}
.product-prices{display:flex;align-items:center;gap:6px;flex-wrap:wrap;margin-bottom:8px;}
.product-price{font-size:14px;font-weight:900;color:#1B3A8C;}
.product-old{font-size:11px;color:#999;text-decoration:line-through;}
.product-discount{background:#ff3333;color:#fff;font-size:10px;font-weight:800;padding:2px 6px;border-radius:10px;}
.add-btn{width:100%;padding:8px;background:#1B3A8C;color:#fff;border:none;border-radius:8px;font-family:'Nunito',sans-serif;font-style:italic;font-size:11px;font-weight:800;cursor:pointer;}

.state-box{display:flex;flex-direction:column;align-items:center;justify-content:center;padding:60px 20px;text-align:center;}
.state-box h3{font-size:16px;font-weight:900;color:#444;margin-bottom:8px;}
.state-box p{font-size:13px;color:#888;}

.skeleton{background:linear-gradient(90deg,#f0f0f0 25%,#e0e0e0 50%,#f0f0f0 75%);background-size:200% 100%;animation:shimmer 1.5s infinite;border-radius:8px;}
@keyframes shimmer{0%{background-position:200% 0}100%{background-position:-200% 0}}

.toast{position:fixed;bottom:90px;left:50%;transform:translateX(-50%) translateY(20px);background:#111;color:#fff;padding:10px 20px;border-radius:20px;font-size:13px;font-weight:700;opacity:0;transition:all .3s;z-index:9999;white-space:nowrap;}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0);}

.bottom-spacer{height:70px;}
.bottom-nav{position:fixed;bottom:0;left:0;right:0;background:#fff;border-top:1px solid #eee;display:flex;z-index:1000;}
.nav-item{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:8px 4px;color:#999;font-size:10px;font-weight:700;text-decoration:none;gap:3px;}
.nav-item.active,.nav-item:hover{color:#1B3A8C;}
.nav-item svg{width:22px;height:22px;stroke:currentColor;}
</style>
</head>
<body>

<div class="header">
  <div class="header-main">
    <button class="back-btn" onclick="history.back()">
      <svg viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="2.5" width="20" height="20"><path d="M19 12H5M12 5l-7 7 7 7"/></svg>
    </button>
    <div class="search-wrap">
      <input type="text" id="searchInput" placeholder="Rechercher un produit..." onkeypress="if(event.key==='Enter')doSearch()">
      <button onclick="doSearch()">
        <svg viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="2.5" width="16" height="16"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg>
      </button>
    </div>
    <a href="panier.html" class="cart-btn">
      <svg viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="2" width="22" height="22"><path d="M6 2L3 6v14a2 2 0 002 2h14a2 2 0 002-2V6l-3-4z"/><line x1="3" y1="6" x2="21" y2="6"/></svg>
      <span class="cart-badge" id="cartBadge"></span>
    </a>
  </div>
</div>

<div class="result-info" id="resultInfo">Chargement...</div>

<div class="products-section">
  <div class="products-grid" id="productsGrid">
    <div class="product-card"><div class="skeleton" style="aspect-ratio:1;"></div><div class="product-info"><div class="skeleton" style="height:28px;margin-bottom:8px;"></div><div class="skeleton" style="height:18px;width:60%;"></div></div></div>
    <div class="product-card"><div class="skeleton" style="aspect-ratio:1;"></div><div class="product-info"><div class="skeleton" style="height:28px;margin-bottom:8px;"></div><div class="skeleton" style="height:18px;width:60%;"></div></div></div>
  </div>
</div>

<div class="bottom-spacer"></div>

<nav class="bottom-nav">
  <a href="index.html" class="nav-item"><svg viewBox="0 0 24 24" fill="none" stroke-width="2"><path d="M3 9l9-7 9 7v11a2 2 0 01-2 2H5a2 2 0 01-2-2z"/></svg>Accueil</a>
  <a href="categorie.html" class="nav-item active"><svg viewBox="0 0 24 24" fill="none" stroke-width="2"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg>Recherche</a>
  <a href="panier.html" class="nav-item"><svg viewBox="0 0 24 24" fill="none" stroke-width="2"><path d="M6 2L3 6v14a2 2 0 002 2h14a2 2 0 002-2V6l-3-4z"/><line x1="3" y1="6" x2="21" y2="6"/></svg>Panier</a>
  <a href="compte.html" class="nav-item"><svg viewBox="0 0 24 24" fill="none" stroke-width="2"><path d="M20 21v-2a4 4 0 00-4-4H8a4 4 0 00-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>Compte</a>
</nav>

<div class="toast" id="toast"></div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getFirestore, collection, getDocs } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyA-nTe9-e0YRHNiYecTqunP2yf_g_p9GBU",
  authDomain: "orakelci.firebaseapp.com",
  projectId: "orakelci",
  storageBucket: "orakelci.firebasestorage.app",
  messagingSenderId: "112433791052",
  appId: "1:112433791052:web:cdb466e52548d4c7b374e9"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

const params = new URLSearchParams(location.search);
let query = decodeURIComponent(params.get('q') || '');

// Set search input value
document.getElementById('searchInput').value = query;

const fmt = n => new Intl.NumberFormat('fr-FR').format(n) + ' F';

function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2000);
}

function updateCartBadge() {
  const cart = JSON.parse(localStorage.getItem('orakel_cart') || '[]');
  const total = cart.reduce((s, i) => s + (i.qty || 1), 0);
  const badge = document.getElementById('cartBadge');
  badge.textContent = total;
  badge.style.display = total > 0 ? 'flex' : 'none';
}

window.addToCart = function(id, name, price, image) {
  const cart = JSON.parse(localStorage.getItem('orakel_cart') || '[]');
  const idx = cart.findIndex(i => i.id === id);
  if (idx > -1) cart[idx].qty = (cart[idx].qty || 1) + 1;
  else cart.push({ id, name, price, image, qty: 1 });
  localStorage.setItem('orakel_cart', JSON.stringify(cart));
  updateCartBadge();
  showToast('Ajouté au panier !');
};

window.doSearch = function() {
  const q = document.getElementById('searchInput').value.trim();
  if (!q) return;
  window.history.replaceState({}, '', 'recherche.html?q=' + encodeURIComponent(q));
  query = q;
  search(q);
};

function cardHTML(p) {
  const disc = p.oldPrice && p.price ? Math.round((1 - p.price/p.oldPrice)*100) : null;
  const img = p.image
    ? `<img class="product-img" src="${p.image}" loading="lazy" onerror="this.outerHTML='<div class=product-img-placeholder><svg viewBox=\\'0 0 24 24\\' fill=\\'none\\' stroke=\\'#1B3A8C\\' stroke-width=\\'1.5\\' width=\\'40\\' height=\\'40\\'><path d=\\'M6 2L3 6v14a2 2 0 002 2h14a2 2 0 002-2V6l-3-4z\\'/></svg></div>'">`
    : `<div class="product-img-placeholder"><svg viewBox="0 0 24 24" fill="none" stroke="#1B3A8C" stroke-width="1.5" width="40" height="40"><path d="M6 2L3 6v14a2 2 0 002 2h14a2 2 0 002-2V6l-3-4z"/></svg></div>`;
  return `
    <a class="product-card" href="produit.html?id=${p.id}">
      ${img}
      <div class="product-info">
        <p class="product-name">${p.name}</p>
        <div class="product-prices">
          <span class="product-price">${fmt(p.price)}</span>
          ${p.oldPrice ? `<span class="product-old">${fmt(p.oldPrice)}</span>` : ''}
          ${disc ? `<span class="product-discount">-${disc}%</span>` : ''}
        </div>
        <button class="add-btn" onclick="event.preventDefault();addToCart('${p.id}','${p.name.replace(/'/g,"\\'")}',${p.price},'${p.image||''}')">+ Panier</button>
      </div>
    </a>`;
}

async function search(q) {
  if (!q) {
    document.getElementById('resultInfo').textContent = 'Entrez un mot clé pour rechercher';
    document.getElementById('productsGrid').innerHTML = `<div class="state-box" style="grid-column:1/-1;"><h3>Recherchez un produit</h3><p>Téléphones, TV, Mode...</p></div>`;
    return;
  }

  document.title = `"${q}" - Orakel`;
  document.getElementById('resultInfo').innerHTML = `Recherche en cours pour <strong>"${q}"</strong>...`;

  try {
    const snap = await getDocs(collection(db, 'products'));
    const ql = q.toLowerCase();
    const results = [];
    snap.forEach(d => {
      const p = { id: d.id, ...d.data() };
      if (
        p.name?.toLowerCase().includes(ql) ||
        p.description?.toLowerCase().includes(ql) ||
        p.category?.toLowerCase().includes(ql) ||
        p.subcat?.toLowerCase().includes(ql)
      ) {
        results.push(p);
      }
    });

    const grid = document.getElementById('productsGrid');
    const info = document.getElementById('resultInfo');

    if (results.length === 0) {
      info.innerHTML = `Aucun résultat pour <strong>"${q}"</strong>`;
      grid.innerHTML = `<div class="state-box" style="grid-column:1/-1;">
        <svg viewBox="0 0 24 24" fill="none" stroke="#ccc" stroke-width="1.5" width="60" height="60"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg>
        <h3 style="margin-top:12px;">Aucun produit trouvé</h3>
        <p>Essayez un autre mot clé</p>
      </div>`;
      return;
    }

    info.innerHTML = `<strong>${results.length}</strong> résultat${results.length > 1 ? 's' : ''} pour <strong>"${q}"</strong>`;
    grid.innerHTML = results.map(cardHTML).join('');

  } catch(e) {
    document.getElementById('resultInfo').textContent = 'Erreur de recherche';
    console.error(e);
  }
}

search(query);
updateCartBadge();
</script>

</body>
</html>

<style>
*{margin:0;padding:0;box-sizing:border-box;}
body{font-family:'Nunito',sans-serif;font-style:italic;background:#f5f5f5;color:#222;}

.header{position:sticky;top:0;z-index:100;background:#1B3A8C;box-shadow:0 2px 12px rgba(0,0,0,.2);}
.header-main{display:flex;align-items:center;gap:12px;padding:10px 16px;}
.back-btn{background:rgba(255,255,255,.15);border:none;border-radius:10px;width:38px;height:38px;display:flex;align-items:center;justify-content:center;cursor:pointer;flex-shrink:0;}
.header-title{color:#fff;font-size:16px;font-weight:900;flex:1;}

/* PROGRESS */
.progress-bar{background:#fff;padding:14px 16px;display:flex;align-items:center;gap:0;margin-bottom:8px;}
.step{display:flex;align-items:center;flex:1;}
.step-dot{width:28px;height:28px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:900;flex-shrink:0;}
.step-dot.done{background:#1B3A8C;color:#fff;}
.step-dot.current{background:#1B3A8C;color:#fff;box-shadow:0 0 0 4px rgba(27,58,140,.2);}
.step-dot.pending{background:#eee;color:#999;}
.step-label{font-size:10px;font-weight:700;margin-left:4px;color:#999;}
.step-label.active{color:#1B3A8C;}
.step-line{flex:1;height:2px;background:#eee;margin:0 4px;}
.step-line.done{background:#1B3A8C;}

/* SECTIONS */
.section-card{background:#fff;border-radius:14px;padding:16px;margin:0 8px 10px;}
.section-header{font-size:15px;font-weight:900;color:#1B3A8C;margin-bottom:14px;display:flex;align-items:center;gap:8px;}
.section-header svg{flex-shrink:0;}

/* FORM */
.form-group{margin-bottom:14px;}
.form-label{display:block;font-size:12px;font-weight:700;color:#555;margin-bottom:6px;}
.form-input{width:100%;padding:12px 14px;border:1.5px solid #e0e0e0;border-radius:10px;font-family:'Nunito',sans-serif;font-style:italic;font-size:14px;outline:none;transition:border-color .2s;}
.form-input:focus{border-color:#1B3A8C;}
.form-input.error{border-color:#e8002d;}
.error-msg{font-size:11px;color:#e8002d;margin-top:3px;display:none;}

.form-row{display:grid;grid-template-columns:1fr 1fr;gap:10px;}

/* PAYMENT OPTIONS */
.payment-options{display:grid;grid-template-columns:1fr 1fr;gap:10px;}
.payment-option{border:2px solid #e0e0e0;border-radius:12px;padding:12px;cursor:pointer;transition:all .2s;display:flex;flex-direction:column;align-items:center;gap:6px;text-align:center;}
.payment-option:hover{border-color:#1B3A8C;background:#f0f4ff;}
.payment-option.selected{border-color:#1B3A8C;background:#e8f0ff;}
.payment-option input{display:none;}
.payment-logo{font-size:26px;}
.payment-name{font-size:12px;font-weight:900;color:#222;}
.payment-sub{font-size:10px;color:#888;}

/* ORDER SUMMARY */
.order-line{display:flex;justify-content:space-between;align-items:flex-start;padding:10px 0;border-bottom:1px solid #f5f5f5;gap:10px;}
.order-line:last-child{border-bottom:none;}
.order-line-img{width:50px;height:50px;border-radius:8px;object-fit:cover;background:#f0f0f0;flex-shrink:0;}
.order-line-info{flex:1;}
.order-line-name{font-size:12px;font-weight:700;color:#222;}
.order-line-qty{font-size:11px;color:#888;}
.order-line-price{font-size:13px;font-weight:900;color:#1B3A8C;flex-shrink:0;}

.total-row{display:flex;justify-content:space-between;font-size:13px;margin-bottom:8px;}
.total-row.main{font-size:17px;font-weight:900;color:#1B3A8C;padding-top:10px;border-top:2px solid #e8f0ff;margin-top:4px;}

/* SUBMIT BTN */
.submit-btn{width:100%;padding:16px;background:#1B3A8C;color:#fff;border:none;border-radius:14px;font-family:'Nunito',sans-serif;font-style:italic;font-size:16px;font-weight:900;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:10px;margin-bottom:12px;transition:background .2s;}
.submit-btn:hover{background:#2650c8;}
.submit-btn:disabled{background:#ccc;cursor:not-allowed;}
.wa-btn{width:100%;padding:14px;background:#25D366;color:#fff;border:none;border-radius:14px;font-family:'Nunito',sans-serif;font-style:italic;font-size:14px;font-weight:900;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:8px;}

.bottom-spacer{height:24px;}
.toast{position:fixed;top:70px;left:50%;transform:translateX(-50%) translateY(-20px);background:#111;color:#fff;padding:10px 20px;border-radius:20px;font-size:13px;font-weight:700;opacity:0;transition:all .3s;z-index:9999;white-space:nowrap;}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0);}
.toast.success{background:#16a34a;}
.toast.error{background:#e8002d;}

@media(min-width:768px){
  .header-main,.section-card,.progress-bar{max-width:600px;margin-left:auto;margin-right:auto;}
  .section-card{border-left:4px solid #1B3A8C;}
}
</style>

    <svg viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="2.5" width="20" height="20"><path d="M5 12h14M12 5l7 7-7 7"/></svg>
    Confirmer ma commande
  </button>
  <button class="wa-btn" onclick="orderViaWhatsApp()">
    <svg viewBox="0 0 24 24" fill="#fff" width="18" height="18"><path d="M17.472 14.382c-.297-.149-1.758-.867-2.03-.967-.273-.099-.471-.148-.67.15-.197.297-.767.966-.94 1.164-.173.199-.347.223-.644.075-.297-.15-1.255-.463-2.39-1.475-.883-.788-1.48-1.761-1.653-2.059-.173-.297-.018-.458.13-.606.134-.133.298-.347.446-.52.149-.174.198-.298.298-.497.099-.198.05-.371-.025-.52-.075-.149-.669-1.612-.916-2.207-.242-.579-.487-.5-.669-.51-.173-.008-.371-.01-.57-.01-.198 0-.52.074-.792.372-.272.297-1.04 1.016-1.04 2.479 0 1.462 1.065 2.875 1.213 3.074.149.198 2.096 3.2 5.077 4.487.709.306 1.262.489 1.694.625.712.227 1.36.195 1.871.118.571-.085 1.758-.719 2.006-1.413.248-.694.248-1.289.173-1.413-.074-.124-.272-.198-.57-.347m-5.421 7.403h-.004a9.87 9.87 0 01-5.031-1.378l-.361-.214-3.741.982.998-3.648-.235-.374a9.86 9.86 0 01-1.51-5.26c.001-5.45 4.436-9.884 9.888-9.884 2.64 0 5.122 1.03 6.988 2.898a9.825 9.825 0 012.893 6.994c-.003 5.45-4.437 9.884-9.885 9.884m8.413-18.297A11.815 11.815 0 0012.05 0C5.495 0 .16 5.335.157 11.892c0 2.096.547 4.142 1.588 5.945L.057 24l6.305-1.654a11.882 11.882 0 005.683 1.448h.005c6.554 0 11.89-5.335 11.893-11.893a11.821 11.821 0 00-3.48-8.413z"/></svg>
    Commander via WhatsApp
  </button>
</div>

<div class="bottom-spacer"></div>
<div class="toast" id="toast"></div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getFirestore, collection, addDoc, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyA-nTe9-e0YRHNiYecTqunP2yf_g_p9GBU",
  authDomain: "orakelci.firebaseapp.com",
  projectId: "orakelci",
  storageBucket: "orakelci.firebasestorage.app",
  messagingSenderId: "112433791052",
  appId: "1:112433791052:web:cdb466e52548d4c7b374e9"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

const CART_KEY = 'orakel_cart';
const cart = JSON.parse(localStorage.getItem(CART_KEY) || '[]');
const fmt = n => new Intl.NumberFormat('fr-FR').format(n) + ' F';

let selectedPayment = 'wave';

function showToast(msg, type='') {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.className = 'toast ' + type;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 3000);
}

window.selectPayment = function(method, el) {
  selectedPayment = method;
  document.querySelectorAll('.payment-option').forEach(o => o.classList.remove('selected'));
  el.classList.add('selected');
};

// Render cart summary
function renderSummary() {
  if (cart.length === 0) {
    document.getElementById('orderLines').innerHTML = '<p style="color:#888;font-size:13px;">Panier vide — <a href="index.html">Retour à l\'accueil</a></p>';
    return;
  }
  const subtotal = cart.reduce((s, i) => s + (i.price * (i.qty || 1)), 0);
  const delivery = subtotal >= 50000 ? 0 : 2000;
  const total = subtotal + delivery;

  document.getElementById('orderLines').innerHTML = cart.map(item => `
    <div class="order-line">
      ${item.image ? `<img class="order-line-img" src="${item.image}" onerror="this.style.display='none'">` : ''}
      <div class="order-line-info">
        <p class="order-line-name">${item.name}</p>
        <p class="order-line-qty">Qté: ${item.qty || 1}</p>
      </div>
      <span class="order-line-price">${fmt(item.price * (item.qty || 1))}</span>
    </div>`).join('');

  document.getElementById('subtotal').textContent = fmt(subtotal);
  document.getElementById('delivery').textContent = delivery === 0 ? '🎉 Gratuite' : fmt(delivery);
  document.getElementById('total').textContent = fmt(total);
  return { subtotal, delivery, total };
}

const summary = renderSummary();

window.submitOrder = async function() {
  const firstName = document.getElementById('firstName').value.trim();
  const lastName = document.getElementById('lastName').value.trim();
  const phone = document.getElementById('phone').value.trim();
  const city = document.getElementById('city').value.trim();
  const address = document.getElementById('address').value.trim();

  // Validate
  let valid = true;
  [['firstName', firstName], ['lastName', lastName], ['phone', phone], ['city', city], ['address', address]].forEach(([id, val]) => {
    const el = document.getElementById(id);
    if (!val) { el.classList.add('error'); valid = false; }
    else el.classList.remove('error');
  });
  if (!valid) { showToast('⚠️ Remplissez les champs obligatoires', 'error'); return; }
  if (!cart.length) { showToast('Votre panier est vide', 'error'); return; }

  const btn = document.getElementById('submitBtn');
  btn.textContent = 'Envoi en cours...';
  btn.disabled = true;

  const orderNumber = 'OR' + Date.now().toString().slice(-8);

  const order = {
    orderNumber,
    name: firstName + ' ' + lastName,
    phone,
    email: document.getElementById('email').value.trim(),
    city,
    address,
    notes: document.getElementById('notes').value.trim(),
    paymentMethod: selectedPayment,
    items: cart,
    subtotal: summary?.subtotal || 0,
    deliveryFee: summary?.delivery || 0,
    totalPrice: summary?.total || 0,
    status: 'new',
    createdAt: serverTimestamp()
  };

  try {
    await addDoc(collection(db, 'orders'), order);
    localStorage.removeItem(CART_KEY);
    // Notification push avec icône Orakel
    try {
      if ('Notification' in window && Notification.permission === 'granted') {
        const notifOptions = {
          body: `N° ${orderNumber} — ${order.name} — ${new Intl.NumberFormat('fr-FR').format(order.totalPrice)} F`,
          icon: 'orakel-icon.png',
          badge: 'orakel-icon.png',
          vibrate: [200, 100, 200],
          tag: 'orakel-order',
          data: { url: 'admin.html' }
        };
        if ('serviceWorker' in navigator) {
          navigator.serviceWorker.ready.then(reg => {
            reg.showNotification('🛍️ Nouvelle commande Orakel !', notifOptions);
          });
        } else {
          new Notification('Nouvelle commande Orakel !', notifOptions);
        }
      }
    } catch(e) { console.warn('Notif error:', e); }
    // Store order number for confirmation page
    localStorage.setItem('orakel_last_order', JSON.stringify({ orderNumber, name: order.name, total: order.totalPrice, phone }));
    location.href = 'confirmation.html';
  } catch(e) {
    console.error(e);
    showToast('Erreur réseau. Essayez WhatsApp.', 'error');
    btn.textContent = 'Confirmer ma commande';
    btn.disabled = false;
  }
};

window.orderViaWhatsApp = function() {
  const firstName = document.getElementById('firstName').value.trim();
  const phone = document.getElementById('phone').value.trim();
  const city = document.getElementById('city').value.trim();
  const address = document.getElementById('address').value.trim();
  const items = cart.map(i => `• ${i.name} x${i.qty||1} = ${fmt(i.price*(i.qty||1))}`).join('\n');
  const total = summary?.total || 0;

  const msg = `🛍️ *Nouvelle commande Orakel*

👤 Nom : ${firstName || '—'}
📞 Tél : ${phone || '—'}
📍 Ville : ${city || '—'}
🏠 Adresse : ${address || '—'}
💳 Paiement : ${selectedPayment}

*Articles :*
${items}

💰 *Total : ${fmt(total)}*

Merci !`;

  window.open('https://wa.me/2250788256952?text=' + encodeURIComponent(msg), '_blank');
};
</script>

</body>
</html>
